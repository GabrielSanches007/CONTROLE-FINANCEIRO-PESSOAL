<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#050510">
<meta name="format-detection" content="telephone=no">
<title>Controle.GS | iPhone Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  :root {
    --bg: #03030a;
    --bg-glass: rgba(12, 12, 24, 0.75);
    --bg-card: rgba(18, 18, 32, 0.65);
    --border: rgba(255, 255, 255, 0.08);
    --border-light: rgba(255, 255, 255, 0.12);
    --accent: #a78bfa;
    --accent-glow: #c084fc;
    --accent-secondary: #f472b6;
    --success: #4ade80;
    --warning: #facc15;
    --danger: #f87171;
    --info: #60a5fa;
    --text: #f0f0ff;
    --text-muted: #8b8aa5;
    --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.4);
    --shadow-glow: 0 0 12px rgba(167, 139, 250, 0.3);
    --glass-blur: blur(16px) saturate(180%);
    --transition-fast: 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    --transition-smooth: 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.2);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100%;
    overflow: hidden;
    position: fixed;
    width: 100%;
  }

  /* animated gradient orbs */
  body::before {
    content: '';
    position: fixed;
    top: -20%;
    right: -20%;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(167, 139, 250, 0.2), transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: floatGlow 12s infinite alternate ease-in-out;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -20%;
    left: -20%;
    width: 450px;
    height: 450px;
    background: radial-gradient(circle, rgba(244, 114, 182, 0.15), transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: floatGlow 15s infinite alternate-reverse ease-in-out;
  }

  @keyframes floatGlow {
    0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
    100% { transform: translate(30px, -30px) scale(1.2); opacity: 0.8; }
  }

  /* status bar + safe areas */
  .sb-spacer {
    height: env(safe-area-inset-top, 44px);
    background: rgba(3, 3, 10, 0.7);
    backdrop-filter: var(--glass-blur);
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 200;
  }

  /* header premium com ajuste iPhone */
  header {
    position: fixed;
    top: env(safe-area-inset-top, 44px);
    left: 0;
    right: 0;
    height: 58px;
    background: rgba(3, 3, 10, 0.7);
    backdrop-filter: var(--glass-blur);
    border-bottom: 1px solid var(--border);
    z-index: 150;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 22px;
  }

  .logo {
    font-size: 1.3rem;
    font-weight: 800;
    font-family: 'Syne', sans-serif;
    background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: -0.3px;
  }

  .logo::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 28px;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
    border-radius: 4px;
  }

  .hdate {
    font-size: 0.7rem;
    font-weight: 500;
    color: var(--text-muted);
    background: rgba(255, 255, 255, 0.05);
    padding: 5px 12px;
    border-radius: 40px;
    backdrop-filter: blur(4px);
  }

  /* scroll area - altura exata para iPhone */
  #app {
    position: fixed;
    top: calc(env(safe-area-inset-top, 44px) + 58px);
    left: 0;
    right: 0;
    bottom: calc(68px + env(safe-area-inset-bottom, 34px));
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
    z-index: 1;
  }

  /* pages animations */
  .page {
    display: none;
    padding: 20px 18px 32px;
    min-height: 100%;
    position: relative;
  }

  .page.active {
    display: block;
    animation: pageEnter 0.45s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
  }

  @keyframes pageEnter {
    0% { opacity: 0; transform: translateY(12px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* text animations */
  .animate-text {
    animation: textGlow 0.8s ease-out;
  }

  @keyframes textGlow {
    0% { opacity: 0; text-shadow: 0 0 0px rgba(167, 139, 250, 0); transform: translateY(8px); }
    100% { opacity: 1; text-shadow: 0 0 6px rgba(167, 139, 250, 0.3); transform: translateY(0); }
  }

  /* page title */
  .ptitle {
    font-size: 1.7rem;
    font-weight: 800;
    font-family: 'Syne', sans-serif;
    letter-spacing: -0.8px;
    margin-bottom: 18px;
    background: linear-gradient(135deg, #fff, var(--text-muted));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .ptitle small {
    font-size: 0.7rem;
    font-weight: 500;
    color: var(--text-muted);
    display: block;
    margin-top: 4px;
    letter-spacing: 0;
    background: none;
    -webkit-background-clip: unset;
    color: var(--text-muted);
  }

  /* cards scroll */
  .cscroll {
    display: flex;
    gap: 14px;
    overflow-x: auto;
    scrollbar-width: none;
    margin: 0 -18px;
    padding: 0 18px 12px;
    margin-bottom: 20px;
  }

  .cscroll::-webkit-scrollbar {
    display: none;
  }

  .card {
    background: var(--bg-card);
    backdrop-filter: var(--glass-blur);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 18px 16px;
    min-width: 148px;
    flex-shrink: 0;
    transition: all var(--transition-fast);
    box-shadow: var(--shadow-sm);
  }

  .card:active {
    transform: scale(0.98);
  }

  .clb {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .cv {
    font-family: 'Inter', monospace;
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: -1px;
  }

  .cv.gr { color: var(--success); text-shadow: 0 0 4px rgba(74,222,128,0.3); }
  .cv.re { color: var(--danger); }
  .cv.ye { color: var(--warning); }
  .cv.bl { color: var(--info); }
  .cv.ac { color: var(--accent); }

  .edit-btn {
    position: absolute;
    top: 14px;
    right: 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 0.6rem;
    padding: 4px 10px;
    border-radius: 40px;
    cursor: pointer;
    font-weight: 600;
  }

  .edit-btn:active {
    background: var(--accent);
    color: white;
    transform: scale(0.92);
  }

  .pbar-wrap {
    background: rgba(255,255,255,0.08);
    border-radius: 60px;
    height: 5px;
    margin-top: 12px;
    overflow: hidden;
  }

  .pbar-fill {
    height: 100%;
    border-radius: 60px;
    background: linear-gradient(90deg, var(--accent), var(--accent-glow));
    transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  }

  /* insight boxes */
  .ibox, .fbox {
    border-radius: 20px;
    padding: 14px 16px;
    margin-bottom: 18px;
    display: flex;
    gap: 12px;
    backdrop-filter: blur(8px);
    animation: slideUp 0.5s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .ibox {
    background: rgba(167, 139, 250, 0.08);
    border: 1px solid rgba(167, 139, 250, 0.3);
  }

  .ibox.warn {
    background: rgba(248, 113, 113, 0.1);
    border-color: rgba(248, 113, 113, 0.4);
  }

  .ibox.ok {
    background: rgba(74, 222, 128, 0.08);
    border-color: rgba(74, 222, 128, 0.3);
  }

  .fbox {
    background: rgba(96, 165, 250, 0.08);
    border: 1px solid rgba(96, 165, 250, 0.3);
  }

  /* chips */
  .fscroll {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scrollbar-width: none;
    margin: 0 -18px;
    padding: 0 18px 8px;
    margin-bottom: 16px;
  }

  .chip {
    flex-shrink: 0;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 0.7rem;
    font-weight: 600;
    padding: 7px 18px;
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(4px);
  }

  .chip.active {
    background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
    border-color: transparent;
    color: white;
    box-shadow: 0 4px 12px rgba(167, 139, 250, 0.4);
  }

  .chip:active {
    transform: scale(0.94);
  }

  /* lista contas premium */
  .clist {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .ci {
    background: var(--bg-card);
    backdrop-filter: var(--glass-blur);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 14px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all 0.25s ease;
    animation: cardFadeIn 0.4s ease backwards;
  }

  @keyframes cardFadeIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .ci:active {
    transform: scale(0.98);
  }

  .ci.vh { border-left: 4px solid var(--warning); }
  .ci.at { border-left: 4px solid var(--danger); }

  .cico {
    width: 44px;
    height: 44px;
    border-radius: 18px;
    background: rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .bpg {
    background: linear-gradient(135deg, var(--accent), var(--accent-glow));
    color: white;
    border: none;
    font-weight: 700;
    padding: 8px 14px;
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(167, 139, 250, 0.3);
  }

  .bpg:active {
    transform: scale(0.92);
  }

  .bdel {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 1rem;
    cursor: pointer;
    padding: 6px;
  }

  .bdel:active {
    color: var(--danger);
    transform: scale(0.9);
  }

  /* tab bar premium com espaço para safe area */
  .tabbar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: calc(68px + env(safe-area-inset-bottom, 34px));
    background: rgba(5, 5, 16, 0.85);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding-bottom: env(safe-area-inset-bottom, 34px);
    z-index: 150;
  }

  .tb {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 0.6rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    padding: 8px 12px;
    border-radius: 40px;
  }

  .tb .ti {
    font-size: 1.5rem;
    transition: transform 0.2s;
  }

  .tb.active {
    color: var(--accent);
    background: rgba(167, 139, 250, 0.1);
  }

  .tb.active .ti {
    transform: translateY(-2px);
    filter: drop-shadow(0 0 6px rgba(167, 139, 250, 0.6));
  }

  /* FAB - ajustado para iPhone */
  .fab {
    position: fixed;
    bottom: calc(78px + env(safe-area-inset-bottom, 34px));
    right: 20px;
    width: 56px;
    height: 56px;
    border-radius: 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
    border: none;
    color: white;
    font-size: 1.8rem;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(167, 139, 250, 0.5);
    transition: all 0.25s ease;
    z-index: 140;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .fab:active {
    transform: scale(0.88) rotate(90deg);
  }

  /* toast */
  .toast {
    position: fixed;
    bottom: calc(90px + env(safe-area-inset-bottom, 34px));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(20, 20, 36, 0.95);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border-light);
    color: white;
    font-weight: 600;
    padding: 12px 24px;
    border-radius: 60px;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    z-index: 400;
    pointer-events: none;
    white-space: nowrap;
    max-width: 90vw;
    font-size: 0.85rem;
    letter-spacing: -0.2px;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* modal bottom sheet */
  .mo {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(12px);
    z-index: 300;
    display: none;
    align-items: flex-end;
  }

  .mo.open {
    display: flex;
    animation: fadeBack 0.25s ease;
  }

  @keyframes fadeBack {
    from { background: rgba(0,0,0,0); backdrop-filter: blur(0); }
    to { background: rgba(0,0,0,0.7); backdrop-filter: blur(12px); }
  }

  .modal {
    background: rgba(10, 10, 22, 0.98);
    border-radius: 32px 32px 0 0;
    padding: 20px 20px 30px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    border-top: 1px solid var(--border-light);
    animation: modalUp 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  }

  @keyframes modalUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal::before {
    content: '';
    display: block;
    width: 40px;
    height: 4px;
    background: var(--text-muted);
    border-radius: 10px;
    margin: 0 auto 20px;
  }

  .mt {
    font-size: 1.2rem;
    font-weight: 800;
    font-family: 'Syne', sans-serif;
    margin-bottom: 20px;
  }

  .fg input, .fg select {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 12px 16px;
    color: white;
    font-family: 'Inter', sans-serif;
    width: 100%;
    transition: all 0.2s;
  }

  .fg input:focus, .fg select:focus {
    border-color: var(--accent);
    outline: none;
    box-shadow: 0 0 0 2px rgba(167, 139, 250, 0.2);
  }

  .bconf {
    background: linear-gradient(135deg, var(--accent), var(--accent-glow));
    border: none;
    padding: 14px;
    border-radius: 28px;
    color: white;
    font-weight: 800;
    cursor: pointer;
  }

  .bconf:active {
    transform: scale(0.97);
  }

  /* ajustes extras para iPhone 13 */
  @media (max-width: 430px) {
    .ptitle {
      font-size: 1.5rem;
    }
    .card {
      min-width: 135px;
      padding: 14px 12px;
    }
    .cv {
      font-size: 1.2rem;
    }
    .fab {
      width: 52px;
      height: 52px;
      font-size: 1.6rem;
      bottom: calc(72px + env(safe-area-inset-bottom, 34px));
    }
    .tb .ti {
      font-size: 1.3rem;
    }
    .tb {
      font-size: 0.55rem;
    }
    .ci {
      padding: 12px;
    }
    .cico {
      width: 40px;
      height: 40px;
      font-size: 1.1rem;
    }
  }

  /* empty states */
  .empty {
    text-align: center;
    padding: 44px 20px;
    color: var(--text-muted);
  }
  .rgrid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .rc {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 14px;
  }
  .ri {
    background: rgba(167, 139, 250, 0.08);
    border-radius: 18px;
    padding: 12px;
    margin-bottom: 16px;
    font-size: 0.75rem;
  }
  .hi {
    background: var(--bg-card);
    border-radius: 16px;
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .cw {
    background: var(--bg-card);
    border-radius: 24px;
    padding: 16px;
    margin-top: 16px;
  }
  .bchart {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    height: 90px;
  }
  .bcol {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }
  .bar {
    width: 100%;
    border-radius: 6px 6px 0 0;
    background: linear-gradient(180deg, var(--accent), var(--accent-secondary));
    transition: height 0.5s;
  }
  .cchart {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .crow {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cbw {
    flex: 1;
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    height: 6px;
  }
  .cbf {
    height: 100%;
    border-radius: 20px;
    background: linear-gradient(90deg, var(--accent), var(--accent-glow));
  }
  .fr {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
  }
  .ma {
    display: flex;
    gap: 12px;
    margin-top: 20px;
  }
  .bcan {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 12px;
    color: var(--text-muted);
    font-weight: 600;
  }
  .mtabs {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }
  .mtab {
    flex: 1;
    text-align: center;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 8px;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-muted);
  }
  .mtab.active {
    background: var(--accent);
    color: white;
    border-color: transparent;
  }
  .tc { display: none; }
  .tc.active { display: block; }
</style>
</head>
<body>

<div class="sb-spacer"></div>
<header>
  <div class="logo">Controle.GS</div>
  <span class="hdate" id="hdate"></span>
</header>

<div id="app">
  <div class="page active" id="page-dashboard">
    <div class="ptitle">Olá 👋<small>visão premium do seu fluxo</small></div>
    <div class="cscroll">
      <div class="card" style="position:relative"><div class="clb">Saldo Base</div><div class="cv gr" id="saldoDisplay">R$ 0,00</div><button class="edit-btn" onclick="editarSaldo()">Editar</button></div>
      <div class="card"><div class="clb">Entradas (mês)</div><div class="cv bl" id="entradasDisplay">R$ 0,00</div></div>
      <div class="card"><div class="clb">A Pagar</div><div class="cv re" id="totalPendente">R$ 0,00</div></div>
      <div class="card"><div class="clb">Saldo Real</div><div class="cv ye" id="saldoReal">R$ 0,00</div></div>
      <div class="card wide"><div class="clb">Progresso</div><div class="cv ac" id="progressoPct">0%</div><div class="pbar-wrap"><div class="pbar-fill" id="progressoBar" style="width:0%"></div></div><div class="plbl" id="progressoLabel">0 de 0 contas</div></div>
    </div>
    <div id="forecastBox"></div><div id="insightDash"></div>
    <div class="sh"><div class="st">📅 Próximas Contas</div><div class="sc" id="totalContas">0</div></div>
    <div class="clist" id="dashContasList"></div>
  </div>
  <div class="page" id="page-contas"><div class="ptitle">Contas<small id="contasCount">0 pendentes</small></div><div class="fscroll" id="filtroContas"></div><div class="clist" id="contasList"></div></div>
  <div class="page" id="page-entradas"><div class="ptitle">Entradas<small id="entradasCount">0</small></div><div class="fscroll" id="filtroEntradas"></div><div class="clist" id="entradasList"></div></div>
  <div class="page" id="page-relatorios"><div class="ptitle">Relatórios</div><select class="msel" id="mesSelect" onchange="renderRel()" style="background:rgba(255,255,255,0.05); border-radius:30px; padding:12px; width:100%; margin-bottom:16px; color:white;"></select><div class="rgrid" id="relResumo"></div><div id="relInsight"></div><div class="sh"><div class="st">Histórico</div><div class="sc" id="histCount"></div></div><div id="histList"></div><div id="chartWrap"></div><div id="catWrap"></div></div>
</div>

<nav class="tabbar"><button class="tb active" id="tab-dashboard" onclick="showPage('dashboard')"><span class="ti">🏠</span>Início</button><button class="tb" id="tab-contas" onclick="showPage('contas')"><span class="ti">📋</span>Contas</button><button class="tb" id="tab-entradas" onclick="showPage('entradas')"><span class="ti">💰</span>Entradas</button><button class="tb" id="tab-relatorios" onclick="showPage('relatorios')"><span class="ti">📊</span>Relatórios</button></nav>
<button class="fab" onclick="abrirModal()">＋</button>
<div class="toast" id="toast"></div>

<!-- MODALS -->
<div class="mo" id="moPrincipal"><div class="modal"><div class="mt">Adicionar</div><div class="mtabs"><div class="mtab active" onclick="switchTab('conta')">📋 Conta</div><div class="mtab" onclick="switchTab('entrada')">💰 Entrada</div></div><div class="tc active" id="tc-conta"><div class="fg"><label>Nome</label><input type="text" id="fNome" placeholder="Ex: Aluguel, Internet…"></div><div class="fr"><div class="fg"><label>Valor R$</label><input type="number" id="fValor" step="0.01"></div><div class="fg"><label>Vencimento</label><input type="date" id="fData"></div></div><div class="fr"><div class="fg"><label>Categoria</label><select id="fCat"><option value="moradia">🏠 Moradia</option><option value="internet">🌐 Internet</option><option value="energia">💡 Energia</option><option value="mercado">🛒 Mercado</option><option value="transporte">🚗 Transporte</option><option value="educacao">🎓 Educação</option><option value="saude">🏥 Saúde</option><option value="outros">📦 Outros</option></select></div><div class="fg"><label>Recorrente</label><select id="fRec"><option value="nao">Não</option><option value="mensal">Mensal</option></select></div></div><div class="ma"><button class="bcan" onclick="fecharModal()">Cancelar</button><button class="bconf" onclick="addConta()">Adicionar</button></div></div><div class="tc" id="tc-entrada"><div class="fg"><label>Descrição</label><input type="text" id="eNome"></div><div class="fr"><div class="fg"><label>Valor R$</label><input type="number" id="eValor" step="0.01"></div><div class="fg"><label>Data</label><input type="date" id="eData"></div></div><div class="fg"><label>Tipo</label><select id="eTipo"><option value="salario">💼 Salário</option><option value="freelance">💻 Freelance</option><option value="investimento">📈 Investimento</option><option value="bonus">🎁 Bônus</option><option value="outro">📦 Outro</option></select></div><div class="ma"><button class="bcan" onclick="fecharModal()">Cancelar</button><button class="bconf gb" onclick="addEntrada()">Adicionar</button></div></div></div></div>
<div class="mo" id="moSaldo"><div class="modal"><div class="mt">Editar Saldo Base</div><div class="fg"><label>Saldo R$</label><input type="number" id="fSaldo" step="0.01"></div><div class="ma"><button class="bcan" onclick="fecharSaldo()">Cancelar</button><button class="bconf" onclick="salvarSaldo()">Salvar</button></div></div></div>
<div class="mo" id="moPagar"><div class="modal"><div class="mt">Confirmar Pagamento</div><div class="pinfo" id="pInfo"></div><div class="fg"><label>Data do Pagamento</label><input type="date" id="fDataPag"></div><div class="ma"><button class="bcan" onclick="fecharPagar()">Cancelar</button><button class="bconf" onclick="confirmarPag()">Confirmar</button></div></div></div>

<script>
// ========== CÓDIGO ORIGINAL COMPLETO (TODAS FUNÇÕES) ==========
const CATS={moradia:{n:'Moradia',i:'🏠'},internet:{n:'Internet',i:'🌐'},energia:{n:'Energia',i:'💡'},mercado:{n:'Mercado',i:'🛒'},transporte:{n:'Transporte',i:'🚗'},educacao:{n:'Educação',i:'🎓'},saude:{n:'Saúde',i:'🏥'},outros:{n:'Outros',i:'📦'}};
const TIPOS={salario:{n:'Salário',i:'💼'},freelance:{n:'Freelance',i:'💻'},investimento:{n:'Investimento',i:'📈'},bonus:{n:'Bônus',i:'🎁'},outro:{n:'Outro',i:'📦'}};
const gC=k=>CATS[k]||CATS.outros; const gT=k=>TIPOS[k]||TIPOS.outro;
function uid(){return([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g,c=>(c^crypto.getRandomValues(new Uint8Array(1))[0]&15>>c/4).toString(16));}
let S={saldoBase:0,contasPendentes:[],entradas:[],historico:{}};
function save(){try{localStorage.setItem('cgs_v3',JSON.stringify(S));}catch(e){}}
function load(){try{const r=localStorage.getItem('cgs_v3')||localStorage.getItem('cgs_v2');if(r)S=JSON.parse(r);if(S.saldo!==undefined&&S.saldoBase===undefined){S.saldoBase=S.saldo;delete S.saldo;}if(!S.historico)S.historico={};if(!S.contasPendentes)S.contasPendentes=[];if(!S.entradas)S.entradas=[];}catch(e){}}
function mk(d){const x=d||new Date();return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0');}
function todasSaidas(){return Object.values(S.historico).flat().reduce((s,c)=>s+c.valor,0);}
function entMes(m){const a=new Date(m+'-01T00:00:00'),b=new Date(a.getFullYear(),a.getMonth()+1,0,23,59,59);return S.entradas.filter(e=>{const d=new Date(e.data+'T00:00:00');return d>=a&&d<=b;}).reduce((s,e)=>s+e.valor,0);}
function saldoReal(){return S.saldoBase+S.entradas.reduce((s,e)=>s+e.valor,0)-todasSaidas();}
function totPend(){return S.contasPendentes.reduce((s,c)=>s+c.valor,0);}
function saldoLivre(){return saldoReal()-totPend();}
function dias(ds){if(!ds)return null;const h=new Date();h.setHours(0,0,0,0);return Math.round((new Date(ds+'T00:00:00')-h)/86400000);}
function previsao(){const sa=saldoReal();const lst=[...S.contasPendentes].sort((a,b)=>new Date(a.dataVenc)-new Date(b.dataVenc));let ac=sa;for(const c of lst){ac-=c.valor;if(ac<0)return{neg:true,conta:c,dias:dias(c.dataVenc),ap:ac};}return{neg:false,sf:ac};}
function catCrescimento(mes){const ms=Object.keys(S.historico).sort();const i=ms.indexOf(mes);if(i<1)return null;const sm=l=>l.reduce((m,c)=>{const k=c.categoria||'outros';m[k]=(m[k]||0)+c.valor;return m;},{});const sa=sm(S.historico[mes]||[]),sb=sm(S.historico[ms[i-1]]||[]);let md=0,mc=null;for(const k of Object.keys(sa)){const d=(sa[k]||0)-(sb[k]||0);if(d>md){md=d;mc=k;}}return mc?{cat:gC(mc),diff:md}:null;}
let cur='dashboard';
function showPage(id){if(id===cur)return;document.getElementById('page-'+cur).classList.remove('active');document.getElementById('page-'+id).classList.add('active');document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));document.getElementById('tab-'+id).classList.add('active');cur=id;if(id==='relatorios')renderRel();if(id==='entradas')renderEnt();renderContas();document.getElementById('app').scrollTo({top:0,behavior:'smooth'});}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}
function fmt(v){return 'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2});}
function render(){renderDash();renderContas();renderEnt();save();}
function renderDash(){const sr=saldoReal(),tp=totPend(),sl=saldoLivre(),m=mk();const em=entMes(m),pg=(S.historico[m]||[]).length,tot=pg+S.contasPendentes.length;const pct=tot>0?Math.round((pg/tot)*100):0;document.getElementById('saldoDisplay').textContent=fmt(S.saldoBase);document.getElementById('entradasDisplay').textContent=fmt(em);document.getElementById('totalPendente').textContent=fmt(tp);document.getElementById('saldoReal').textContent=fmt(sl);document.getElementById('saldoReal').className='cv '+(sl>=0?'ye':'re');document.getElementById('progressoPct').textContent=pct+'%';document.getElementById('progressoBar').style.width=pct+'%';document.getElementById('progressoLabel').textContent=pg+' de '+tot+' contas';document.getElementById('totalContas').textContent=S.contasPendentes.length+' pendentes';document.getElementById('hdate').textContent=new Date().toLocaleDateString('pt-BR',{day:'numeric',month:'short'});const pv=previsao();const fb=document.getElementById('forecastBox');if(pv.neg){const d=pv.dias;const q=d<0?'já está':(d===0?'hoje ficará':('em '+d+'d ficará'));fb.innerHTML='<div class="fbox animate-text">📉 Projeção: saldo <strong>'+q+' negativo</strong> ao pagar <strong>'+pv.conta.nome+'</strong> → '+fmt(pv.ap)+'.</div>';}else if(pv.sf!==undefined&&S.contasPendentes.length>0){fb.innerHTML='<div class="fbox animate-text">✅ Após todas as contas: <strong>'+fmt(pv.sf)+'</strong> disponível.</div>';}else{fb.innerHTML='';}const at=S.contasPendentes.filter(c=>{const d=dias(c.dataVenc);return d!==null&&d<0;});const ur=S.contasPendentes.filter(c=>{const d=dias(c.dataVenc);return d!==null&&d>=0&&d<=3;});let msg='',cls='';if(at.length>0){const v=at.reduce((s,c)=>s+c.valor,0);msg='⚠️ <strong>'+at.length+' atrasada(s)</strong> — total '+fmt(v);cls='warn';}else if(ur.length>0){msg='🔔 <strong>'+ur.length+' conta(s)</strong> vencem em até 3 dias.';}else if(S.contasPendentes.length===0&&pg>0){msg='🎉 Todas as contas quitadas!';cls='ok';}document.getElementById('insightDash').innerHTML=msg?'<div class="ibox '+cls+' animate-text"><span class="ii">💡</span><div class="it">'+msg+'</div></div>':'';const s=[...S.contasPendentes].sort((a,b)=>(dias(a.dataVenc)??9999)-(dias(b.dataVenc)??9999));renderLista('dashContasList',s.slice(0,5),sr);}
let fAtivo='todas'; function setFiltro(f,el){fAtivo=f;document.querySelectorAll('#page-contas .chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');renderContas();}
function renderContas(){document.getElementById('contasCount').textContent=S.contasPendentes.length+' pendentes';let l=[...S.contasPendentes].sort((a,b)=>(dias(a.dataVenc)??9999)-(dias(b.dataVenc)??9999));if(fAtivo==='hoje')l=l.filter(c=>dias(c.dataVenc)===0);else if(fAtivo==='atrasadas')l=l.filter(c=>{const d=dias(c.dataVenc);return d!==null&&d<0;});else if(fAtivo==='semana')l=l.filter(c=>{const d=dias(c.dataVenc);return d!==null&&d>=0&&d<=7;});else if(fAtivo==='urgentes')l=l.filter(c=>{const d=dias(c.dataVenc);return d!==null&&d<=3;});else if(fAtivo==='recorrentes')l=l.filter(c=>c.recorrente==='mensal');renderLista('contasList',l,saldoReal());}
function renderLista(id,lista,sBase){const el=document.getElementById(id);if(!lista.length){el.innerHTML='<div class="empty"><div class="ei2">✨</div>Nenhuma conta aqui</div>';return;}let sim=sBase;el.innerHTML=lista.map(c=>{const d=dias(c.dataVenc);let cls='',bdgs='';if(d!==null&&d<0){cls='at';bdgs+='<span class="bdg ba">Atrasada '+Math.abs(d)+'d</span>';}else if(d===0){cls='vh';bdgs+='<span class="bdg bh">Hoje</span>';}else if(d!==null&&d<=3){cls='vh';bdgs+='<span class="bdg bh">Em '+d+'d</span>';}if(c.recorrente==='mensal')bdgs+='<span class="bdg br">🔄</span>';const cat=gC(c.categoria);bdgs+='<span class="bdg bc">'+cat.n+'</span>';const df=c.dataVenc?new Date(c.dataVenc+'T00:00:00').toLocaleDateString('pt-BR'):'Sem data';sim-=c.valor;return '<div class="ci '+cls+'" id="ci-'+c.id+'"><div class="cico">'+cat.i+'</div><div class="cinf"><div class="cnm">'+c.nome+'</div><div class="cmt">Vence '+df+'</div><div class="cbdg">'+bdgs+'</div><div class="sim '+(sim>=0?'p':'n')+'">Após: '+fmt(sim)+'</div></div><div class="crt"><div class="cvl">'+fmt(c.valor)+'</div><button class="bpg" onclick="abrirPagar(\''+c.id+'\')">Pagar</button><button class="bdel" onclick="delConta(\''+c.id+'\')">✕</button></div></div>';}).join('');}
let eFiltro='mes';function setEntFiltro(f,el){eFiltro=f;document.querySelectorAll('#page-entradas .chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');renderEnt();}
function renderEnt(){const m=mk();let l=[...S.entradas].sort((a,b)=>new Date(b.data)-new Date(a.data));if(eFiltro==='mes'){const a=new Date(m+'-01T00:00:00'),b=new Date(a.getFullYear(),a.getMonth()+1,0,23,59,59);l=l.filter(e=>{const d=new Date(e.data+'T00:00:00');return d>=a&&d<=b;});}document.getElementById('entradasCount').textContent=l.length+' registros';const el=document.getElementById('entradasList');if(!l.length){el.innerHTML='<div class="empty"><div class="ei2">💰</div>Nenhuma entrada</div>';return;}el.innerHTML=l.map(e=>{const t=gT(e.tipo);const df=new Date(e.data+'T00:00:00').toLocaleDateString('pt-BR');return '<div class="ei"><div class="cico">'+t.i+'</div><div class="cinf"><div class="cnm">'+e.nome+'</div><div class="cmt">'+t.n+' · '+df+'</div></div><div class="ev">'+fmt(e.valor)+'</div><button class="bdel" onclick="delEnt(\''+e.id+'\')">✕</button></div>';}).join('');}
let tabA='conta';function abrirModal(){switchTab(tabA);['fNome','fValor','fData','eNome','eValor','eData'].forEach(i=>document.getElementById(i).value='');document.getElementById('moPrincipal').classList.add('open');}function fecharModal(){document.getElementById('moPrincipal').classList.remove('open');}function switchTab(t){tabA=t;document.querySelectorAll('.mtab').forEach((b,i)=>b.classList.toggle('active',(t==='conta'&&i===0)||(t==='entrada'&&i===1)));document.getElementById('tc-conta').classList.toggle('active',t==='conta');document.getElementById('tc-entrada').classList.toggle('active',t==='entrada');}
function addConta(){const n=document.getElementById('fNome').value.trim();const v=parseFloat(document.getElementById('fValor').value);const dv=document.getElementById('fData').value;const cat=document.getElementById('fCat').value;const rec=document.getElementById('fRec').value;if(!n||!v||v<=0)return;S.contasPendentes.push({id:uid(),nome:n,valor:v,dataVenc:dv,categoria:cat,recorrente:rec,criadaEm:new Date().toISOString()});fecharModal();render();toast('✅ Conta adicionada com estilo!');}
function addEntrada(){const n=document.getElementById('eNome').value.trim();const v=parseFloat(document.getElementById('eValor').value);const d=document.getElementById('eData').value||new Date().toISOString().slice(0,10);const t=document.getElementById('eTipo').value;if(!n||!v||v<=0)return;S.entradas.push({id:uid(),nome:n,valor:v,data:d,tipo:t,criadaEm:new Date().toISOString()});fecharModal();render();renderEnt();toast('💰 Entrada registrada!');}
let cPagar=null;function abrirPagar(id){cPagar=id;const c=S.contasPendentes.find(x=>x.id===id);if(!c)return;document.getElementById('pInfo').innerHTML='<strong>'+c.nome+'</strong> — <strong>'+fmt(c.valor)+'</strong>';document.getElementById('fDataPag').value=new Date().toISOString().slice(0,10);document.getElementById('moPagar').classList.add('open');}function fecharPagar(){document.getElementById('moPagar').classList.remove('open');cPagar=null;}function confirmarPag(){const id=cPagar;const dEsc=document.getElementById('fDataPag').value;const idx=S.contasPendentes.findIndex(c=>c.id===id);if(idx===-1){fecharPagar();return;}const c=S.contasPendentes[idx];const dr=dEsc?new Date(dEsc+'T00:00:00'):new Date();const m=mk(dr);if(!S.historico[m])S.historico[m]=[];S.historico[m].push({...c,dataPagamento:dr.toLocaleDateString('pt-BR'),dataPagamentoISO:dr.toISOString().slice(0,10)});fecharPagar();S.contasPendentes.splice(idx,1);if(c.recorrente==='mensal'){const px=c.dataVenc?(()=>{const d=new Date(c.dataVenc+'T00:00:00');d.setMonth(d.getMonth()+1);return d.toISOString().slice(0,10);})():'';S.contasPendentes.push({...c,id:uid(),dataVenc:px,criadaEm:new Date().toISOString()});toast('💸 Paga! Próxima recorrente criada.');}else{toast('💸 Conta paga!');}render();}
function delConta(id){S.contasPendentes=S.contasPendentes.filter(c=>c.id!==id);render();toast('🗑️ Removida');}function delEnt(id){S.entradas=S.entradas.filter(e=>e.id!==id);render();renderEnt();toast('🗑️ Entrada removida');}
function editarSaldo(){document.getElementById('fSaldo').value=S.saldoBase;document.getElementById('moSaldo').classList.add('open');}function fecharSaldo(){document.getElementById('moSaldo').classList.remove('open');}function salvarSaldo(){const v=parseFloat(document.getElementById('fSaldo').value);if(isNaN(v))return;S.saldoBase=v;fecharSaldo();render();toast('💰 Saldo base atualizado!');}
function renderRel(){const ms=Object.keys(S.historico).sort().reverse();const sel=document.getElementById('mesSelect');const msEl=sel.value||(ms[0]||mk());sel.innerHTML='';[...new Set([mk(),...ms])].sort().reverse().forEach(m=>{const[y,mo]=m.split('-');const n=new Date(+y,+mo-1,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});sel.innerHTML+='<option value="'+m+'" '+(m===msEl?'selected':'')+'>'+n+'</option>';});const cs=S.historico[msEl]||[];const tot=cs.reduce((s,c)=>s+c.valor,0);const em=entMes(msEl);const res=em-tot;document.getElementById('relResumo').innerHTML='<div class="rc"><div class="rl">Total Pago</div><div class="rv" style="color:var(--danger)">'+fmt(tot)+'</div></div><div class="rc"><div class="rl">Entradas</div><div class="rv" style="color:var(--info)">'+fmt(em)+'</div></div><div class="rc"><div class="rl">Resultado</div><div class="rv" style="color:'+(res>=0?'var(--success)':'var(--danger)')+'">'+fmt(res)+'</div></div><div class="rc"><div class="rl">Pagas</div><div class="rv">'+cs.length+'</div></div>';document.getElementById('histCount').textContent=cs.length+' registros';const iEl=document.getElementById('relInsight');iEl.innerHTML='';if(cs.length>0){const pc={};cs.forEach(c=>{const k=c.categoria||'outros';pc[k]=(pc[k]||0)+c.valor;});const tk=Object.keys(pc).sort((a,b)=>pc[b]-pc[a])[0];const tCat=gC(tk);const tPct=Math.round((pc[tk]/tot)*100);const msO=Object.keys(S.historico).sort();const iAt=msO.indexOf(msEl);let cTxt='';if(iAt>0){const tA=S.historico[msO[iAt-1]].reduce((s,c)=>s+c.valor,0);const df=tot-tA;const dp=tA>0?Math.abs(Math.round((df/tA)*100)):0;cTxt=df>0?' <strong>+'+dp+'%</strong> vs anterior.':df<0?' <strong>-'+dp+'%</strong> vs anterior. 🎉':'';}const cr=catCrescimento(msEl);const crT=cr?' Crescimento: <strong>'+cr.cat.i+' '+cr.cat.n+'</strong> (+'+fmt(cr.diff)+').':'';iEl.innerHTML='<div class="ri">'+tCat.i+' Maior: <strong>'+tCat.n+'</strong> ('+tPct+'% — '+fmt(pc[tk])+').'+cTxt+crT+'</div>';}document.getElementById('histList').innerHTML=!cs.length?'<div class="empty"><div class="ei2">📂</div>Nenhum pagamento</div>':cs.map(c=>{const cat=gC(c.categoria);return '<div class="hi"><div style="font-size:1.05rem">'+cat.i+'</div><div class="hn">'+c.nome+'<br><span style="font-size:.62rem;color:var(--text-muted)">'+c.dataPagamento+'</span></div><div class="hv">'+fmt(c.valor)+'</div></div>';}).join('');const msKeys=Object.keys(S.historico).sort();if(msKeys.length>=2){const ts=msKeys.map(m=>S.historico[m].reduce((s,c)=>s+c.valor,0));const mx=Math.max(...ts,1);document.getElementById('chartWrap').innerHTML='<div class="cw"><div class="ct">📊 Evolução mensal</div><div class="bchart">'+msKeys.map((m,i)=>{const n=new Date(m.split('-')[0],+m.split('-')[1]-1,1).toLocaleDateString('pt-BR',{month:'short'});const h=Math.round((ts[i]/mx)*80);return '<div class="bcol"><div class="bar '+(m===msEl?'d':'')+'" style="height:'+h+'px"></div><div class="blbl">'+n+'</div></div>';}).join('')+'</div></div>';}else{document.getElementById('chartWrap').innerHTML='';}if(cs.length){const pc={};cs.forEach(c=>{const k=c.categoria||'outros';pc[k]=(pc[k]||0)+c.valor;});const mx=Math.max(...Object.values(pc),1);document.getElementById('catWrap').innerHTML='<div class="cw"><div class="ct">📂 Por categoria</div><div class="cchart">'+Object.entries(pc).sort((a,b)=>b[1]-a[1]).map(([k,v])=>{const cat=gC(k);const pct=Math.round((v/mx)*100);return '<div class="crow"><div class="crlbl">'+cat.i+' '+cat.n+'</div><div class="cbw"><div class="cbf" style="width:'+pct+'%"></div></div><div class="cval">'+fmt(v)+'</div></div>';}).join('')+'</div></div>';}else{document.getElementById('catWrap').innerHTML='';}}
['moPrincipal','moSaldo','moPagar'].forEach(id=>{document.getElementById(id).addEventListener('click',e=>{if(e.target===e.currentTarget)document.getElementById(id).classList.remove('open');});});
function initUI(){const fDiv=document.getElementById('filtroContas');fDiv.innerHTML='<div class="chip active" onclick="setFiltro(\'todas\',this)">Todas</div><div class="chip" onclick="setFiltro(\'hoje\',this)">Hoje</div><div class="chip" onclick="setFiltro(\'atrasadas\',this)">Atrasadas</div><div class="chip" onclick="setFiltro(\'semana\',this)">Semana</div><div class="chip" onclick="setFiltro(\'recorrentes\',this)">🔄 Recorrentes</div><div class="chip" onclick="setFiltro(\'urgentes\',this)">🔥 Foco</div>';const eDiv=document.getElementById('filtroEntradas');eDiv.innerHTML='<div class="chip active" onclick="setEntFiltro(\'mes\',this)">Este mês</div><div class="chip" onclick="setEntFiltro(\'todas\',this)">Todas</div>';}
load();initUI();render();
</script>
</body>
